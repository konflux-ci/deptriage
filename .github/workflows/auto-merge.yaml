name: Auto-merge approved dependency PRs

on:
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    name: Merge if all checks pass
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Attempt merge for eligible PRs
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.check_suite.head_sha }}
        run: |
          # Find open PRs associated with this check suite's head SHA
          prs=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --json number,author,labels,headRefOid \
            --jq ".[] | select(.headRefOid == \"$HEAD_SHA\")")

          if [ -z "$prs" ]; then
            echo "No open PRs found for SHA $HEAD_SHA"
            exit 0
          fi

          echo "$prs" | jq -c '.' | while read -r pr; do
            number=$(echo "$pr" | jq -r '.number')
            author=$(echo "$pr" | jq -r '.author.login')
            labels=$(echo "$pr" | jq -r '[.labels[].name] | join(",")')

            echo "Checking PR #$number (author: $author, labels: $labels)"

            # Only bot PRs
            if [[ "$author" != "renovate[bot]" && "$author" != "red-hat-konflux[bot]" ]]; then
              echo "  Skipping: not a dependency bot PR"
              continue
            fi

            # Must have approved + lgtm labels
            if [[ "$labels" != *"approved"* ]] || [[ "$labels" != *"lgtm"* ]]; then
              echo "  Skipping: missing approved/lgtm labels"
              continue
            fi

            # Must NOT have risk/high label
            if [[ "$labels" == *"risk/high"* ]]; then
              echo "  Skipping: risk/high label present"
              continue
            fi

            # Check all CI checks pass (allow cancelled from concurrency groups)
            failing=$(gh pr checks "$number" \
              --repo "$GITHUB_REPOSITORY" \
              --json name,state \
              --jq '[.[] | select(.name != "Merge if all checks pass") | select(.state != "SUCCESS" and .state != "SKIPPED" and .state != "CANCELLED")] | length')

            if [ "$failing" != "0" ]; then
              echo "  Skipping: $failing check(s) not yet passing"
              continue
            fi

            echo "  All conditions met — merging PR #$number"
            if gh pr merge "$number" --repo "$GITHUB_REPOSITORY" --squash; then
              echo "  PR #$number merged successfully"
            else
              echo "  Merge failed (may already be merged or have conflicts)"
            fi
          done
