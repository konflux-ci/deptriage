name: Auto-merge approved dependency PRs

on:
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    name: Merge if all checks pass
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./
        with:
          command: merge
          head-sha: ${{ github.event.check_suite.head_sha }}
